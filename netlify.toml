# Netlify config for imua.space (Joshua's "Idea Center" team)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Netlify Forms: contact capture uses the proven quoter-app pattern.
# A hidden static form in /public registers the form at build time;
# the live Connect form posts to it.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
