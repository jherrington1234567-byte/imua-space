<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#12100c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ORIGIN — I Don't Love You Right Now</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <meta name="description" content="ORIGIN: I Don't Love You Right Now. The prologue to The Values Project by Joshua Herrington." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #ede4d8;
      --bg:         #12100c;
      --bg-page:    #18150f;
      --amber:      #d4a054;
      --amber-lt:   #e8b86a;
      --amber-faint:rgba(212,160,84,0.10);
      --ember:      #c4843a;
      --rule:       rgba(212,160,84,0.18);
      --muted:      rgba(237,228,216,0.45);
      --spine:      #0d0b08;
      --spine-mid:  #1a1610;
      --sidebar-w:  250px;
      --transition: 0.32s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--spine);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app { display: flex; min-height: 100vh; position: relative; }

    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 40; opacity: 0;
      transition: opacity var(--transition);
    }
    #overlay.visible { display: block; opacity: 1; }

    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--spine);
      border-right: 1px solid var(--rule);
      height: 100vh; position: sticky; top: 0;
      overflow-y: auto; overflow-x: hidden; scrollbar-width: none;
      display: flex; flex-direction: column;
      padding: 44px 0 40px;
      transition: transform var(--transition), width var(--transition);
      z-index: 50;
    }
    #sidebar::-webkit-scrollbar { display: none; }
    #sidebar.collapsed { width: 0; padding: 0; border-right-color: transparent; }
    #sidebar.collapsed * { opacity: 0; pointer-events: none; }

    @media (max-width: 768px) {
      #sidebar {
        position: fixed; top: 0; left: 0;
        bottom: 0; height: auto;
        width: min(var(--sidebar-w), 82vw);
        transform: translateX(-105%);
        padding-top: 72px;
        box-shadow: 4px 0 32px rgba(0,0,0,0.4);
        z-index: 50;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar.collapsed { width: min(var(--sidebar-w), 82vw); padding-top: 72px; }
      #sidebar.collapsed * { opacity: 1; pointer-events: auto; }
    }

    .sidebar-brand { padding: 0 26px 32px; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
    .sidebar-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 24px; font-weight: 300; letter-spacing: 0.18em;
      color: var(--amber-lt); text-transform: uppercase; line-height: 1; margin-bottom: 6px;
    }
    .sidebar-author { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }

    .nav-section-label { font-size: 9.5px; letter-spacing: 0.22em; color: rgba(212,160,84,0.4); text-transform: uppercase; padding: 18px 26px 6px; }

    .nav-item {
      display: block; padding: 10px 26px;
      font-size: 13.5px; letter-spacing: 0.03em; color: rgba(237,228,216,0.45);
      cursor: pointer; border-left: 2px solid transparent;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      line-height: 1.45; user-select: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nav-item:hover { color: var(--amber-lt); background: var(--amber-faint); }
    .nav-item.active { color: var(--amber-lt); border-left-color: var(--amber); background: rgba(212,160,84,0.08); }

    .nav-item.nav-link-ext {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(212,160,84,0.4);
      letter-spacing: 0.08em;
    }
    .nav-item.nav-link-ext:hover { color: var(--amber-lt); }

    #toggle-btn {
      position: fixed; top: 16px; left: 16px; z-index: 60;
      width: 40px; height: 40px;
      background: var(--spine-mid);
      border: 1px solid rgba(212,160,84,0.3);
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 5px; padding: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    #toggle-btn:hover { background: #2a2218; border-color: var(--amber); }
    #toggle-btn.hidden { display: none; }

    .toggle-bar {
      width: 18px; height: 1.5px; background: var(--amber-lt); border-radius: 1px;
      transition: transform var(--transition), opacity var(--transition);
      transform-origin: center;
    }
    #toggle-btn.open .bar1 { transform: translateY(6.5px) rotate(45deg); }
    #toggle-btn.open .bar2 { opacity: 0; transform: scaleX(0); }
    #toggle-btn.open .bar3 { transform: translateY(-6.5px) rotate(-45deg); }

    @media (min-width: 769px) {
      #toggle-btn { left: calc(var(--sidebar-w) + 16px); transition: left var(--transition), background 0.2s; }
      body.sidebar-collapsed #toggle-btn { left: 16px; }
    }

    #main {
      flex: 1; background: var(--bg-page);
      min-height: 100vh; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    /* ── Cover ── */
    #cover {
      min-height: 100vh; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 60px 40px;
      position: relative; overflow: hidden; cursor: pointer;
    }
    #cover::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 45%, rgba(212,160,84,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 30% 70%, rgba(196,132,58,0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    .cover-border { position: absolute; inset: 22px; border: 1px solid rgba(212,160,84,0.15); pointer-events: none; }
    .cover-border::before { content: ''; position: absolute; inset: 7px; border: 1px solid rgba(212,160,84,0.06); }
    .cover-series {
      font-size: 11px; letter-spacing: 0.38em; color: rgba(212,160,84,0.4);
      text-transform: uppercase; margin-bottom: 40px;
    }
    .cover-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(64px, 16vw, 120px); font-weight: 300;
      letter-spacing: 0.22em; color: var(--amber-lt); line-height: 1; text-transform: uppercase;
    }
    .cover-subtitle {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(15px, 2.5vw, 20px); font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em; color: rgba(237,228,216,0.45);
      margin-top: 20px; margin-bottom: 52px;
      max-width: 440px;
    }
    .cover-rule { width: 160px; height: 1px; background: linear-gradient(to right, transparent, var(--ember), transparent); margin: 0 auto 32px; }
    .cover-author {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(13px, 2vw, 16px); font-weight: 400;
      letter-spacing: 0.22em; color: rgba(212,160,84,0.45); text-transform: uppercase;
    }
    .cover-cta {
      position: absolute; bottom: 50px;
      font-size: 11px; letter-spacing: 0.22em;
      color: rgba(212,160,84,0.4); text-transform: uppercase;
      animation: breathe 2.8s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.85} }

    /* ── Page ── */
    .page { max-width: 720px; margin: 0 auto; padding: 72px 48px 100px; animation: pageIn 0.4s ease both; }
    @keyframes pageIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @media (max-width: 768px) { .page { padding: 64px 24px 80px; } }
    @media (max-width: 480px) { .page { padding: 56px 18px 72px; } }

    /* ── Part header ── */
    .part-header { text-align: center; padding: 64px 0 52px; border-bottom: 1px solid var(--rule); margin-bottom: 72px; }
    .part-number-label { font-size: 11px; letter-spacing: 0.38em; color: var(--ember); text-transform: uppercase; margin-bottom: 20px; }
    .part-main-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 6vw, 54px); font-weight: 300;
      color: var(--ink); line-height: 1.1; margin-bottom: 16px;
    }
    .part-main-subtitle { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(16px, 2.2vw, 19px); font-style: italic; color: var(--muted); font-weight: 300; }

    /* ── Essay ── */
    .essay { margin-bottom: 72px; }
    .anchor-label { font-size: 10px; letter-spacing: 0.24em; color: var(--ember); text-transform: uppercase; margin-bottom: 12px; }
    .essay-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(26px, 4vw, 34px); font-weight: 400;
      color: var(--ink); line-height: 1.2; margin-bottom: 38px;
    }
    .essay p {
      font-size: clamp(18px, 2.2vw, 20px); line-height: 1.88;
      color: rgba(237,228,216,0.88); margin-bottom: 1.5em;
      text-align: justify; hyphens: auto; -webkit-hyphens: auto;
    }
    .essay p:first-of-type::first-letter {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 72px; font-weight: 300; float: left;
      line-height: 0.74; padding-right: 11px; padding-top: 8px; color: var(--amber);
    }

    /* ── Divider ── */
    .section-divider { display: flex; align-items: center; gap: 16px; margin: 60px 0; }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
    .divider-ornament { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 18px; color: var(--amber); opacity: 0.5; }

    /* ── Page nav ── */
    .page-nav { display: flex; justify-content: space-between; align-items: center; padding-top: 44px; border-top: 1px solid var(--rule); margin-top: 64px; }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 13.5px; letter-spacing: 0.12em; color: var(--muted);
      text-transform: uppercase; padding: 8px 0; transition: color 0.2s;
    }
    .nav-btn:hover { color: var(--amber); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
    .nav-indicator { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14.5px; color: var(--amber); opacity: 0.5; font-style: italic; }

    .hidden { display: none !important; }

    /* ── Audio Player ── */
    #player-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--spine);
      border-top: 1px solid var(--rule);
      padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 7px;
    }
    .player-row { display: flex; align-items: center; gap: 14px; }
    #play-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--amber); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    #play-btn:hover { background: var(--amber-lt); transform: scale(1.06); }
    #play-btn svg { width: 13px; height: 13px; fill: #fff; pointer-events: none; }
    .player-meta { flex: 1; min-width: 0; }
    .player-title {
      font-family: 'EB Garamond', serif; font-size: 13px;
      letter-spacing: 0.06em; color: var(--amber-lt);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-time { font-size: 11px; letter-spacing: 0.07em; color: rgba(212,160,84,0.45); margin-top: 1px; }
    #speed-btn {
      background: none; border: 1px solid rgba(212,160,84,0.3); border-radius: 4px;
      padding: 3px 8px; font-family: 'EB Garamond', serif;
      font-size: 12px; color: rgba(212,160,84,0.5); cursor: pointer;
      transition: color 0.2s, border-color 0.2s; flex-shrink: 0;
    }
    #speed-btn:hover { color: var(--amber-lt); border-color: var(--amber); }
    .player-scrub {
      position: relative; height: 3px; background: rgba(212,160,84,0.15);
      border-radius: 2px; cursor: pointer;
    }
    #scrub-fill {
      height: 100%; width: 0%; background: linear-gradient(to right, var(--ember), var(--amber));
      border-radius: 2px; pointer-events: none;
      transition: width 0.2s linear;
    }
  </style>
</head>
<body>

<div id="app">
  <nav id="sidebar" aria-label="Book navigation">
    <div class="sidebar-brand">
      <div class="sidebar-title">ORIGIN</div>
      <div class="sidebar-author">Joshua Herrington</div>
    </div>
    <div id="nav-links"></div>
  </nav>

  <div id="overlay" onclick="closeSidebar()"></div>

  <button id="toggle-btn" class="hidden" onclick="toggleSidebar()" aria-label="Toggle navigation">
    <div class="toggle-bar bar1"></div>
    <div class="toggle-bar bar2"></div>
    <div class="toggle-bar bar3"></div>
  </button>

  <main id="main"></main>
</div>

<audio id="audio" preload="metadata"></audio>

<div id="player-bar">
  <div class="player-scrub" id="scrub">
    <div id="scrub-fill"></div>
  </div>
  <div class="player-row">
    <button id="play-btn" aria-label="Play / Pause">
      <svg id="icon-play"  viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <div class="player-meta">
      <div class="player-title" id="player-title">ORIGIN — I Don't Love You Right Now</div>
      <div class="player-time" id="player-time">0:00 / 0:00</div>
    </div>
    <button id="speed-btn">1&times;</button>
  </div>
</div>

<script src="origin-book-data.js"></script>
<script>
(function () {
  'use strict';

  const allIds = ['cover', ...ORIGIN_BOOK.sections.map(s => s.id)];
  let current = 'cover';
  let sidebarOpen = false;
  const isMobile = () => window.innerWidth <= 768;

  const $main     = document.getElementById('main');
  const $sidebar  = document.getElementById('sidebar');
  const $navLinks = document.getElementById('nav-links');
  const $toggle   = document.getElementById('toggle-btn');
  const $overlay  = document.getElementById('overlay');

  function buildNav() {
    $navLinks.innerHTML = '';
    const lbl = document.createElement('div');
    lbl.className = 'nav-section-label';
    lbl.textContent = 'Contents';
    $navLinks.appendChild(lbl);
    const addItem = (id, label) => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (id === current ? ' active' : '');
      el.textContent = label;
      el.onclick = () => { navigate(id); if (isMobile()) closeSidebar(); };
      $navLinks.appendChild(el);
    };
    ORIGIN_BOOK.sections.forEach(s => addItem(s.id, s.label));

    // Series navigation
    const seriesLbl = document.createElement('div');
    seriesLbl.className = 'nav-section-label';
    seriesLbl.style.marginTop = '16px';
    seriesLbl.textContent = 'The Values Project';
    $navLinks.appendChild(seriesLbl);

    const addLink = (href, label) => {
      const el = document.createElement('div');
      el.className = 'nav-item nav-link-ext';
      el.textContent = label;
      el.onclick = () => { window.location.href = href; };
      $navLinks.appendChild(el);
    };
    addLink('/book/', 'Series Home');
    addLink('/imua/', 'Next: IMUA →');

    const spacer = document.createElement('div');
    spacer.style.height = '120px';
    spacer.style.flexShrink = '0';
    $navLinks.appendChild(spacer);
  }

  function navigate(id) {
    current = id;
    $main.scrollTop = 0;
    render();
    $main.scrollTop = 0;
    window.scrollTo(0, 0);
    buildNav();
  }

  function render() {
    const idx = allIds.indexOf(current);
    $main.innerHTML = '';
    if (current === 'cover') { $toggle.classList.add('hidden'); renderCover(); return; }
    $toggle.classList.remove('hidden');
    const section = ORIGIN_BOOK.sections.find(s => s.id === current);
    if (section) renderSection(section, idx);
  }

  function renderCover() {
    const div = document.createElement('div');
    div.id = 'cover';
    div.innerHTML = `
      <div class="cover-border"></div>
      <div class="cover-series">The Values Project &middot; Prologue</div>
      <div class="cover-title">${ORIGIN_BOOK.title}</div>
      <div class="cover-subtitle">${ORIGIN_BOOK.subtitle}</div>
      <div class="cover-rule"></div>
      <div class="cover-author">${ORIGIN_BOOK.author}</div>
      <div class="cover-cta">Open Book &darr;</div>`;
    div.onclick = () => navigate(allIds[1]);
    $main.appendChild(div);
  }

  function renderSection(section, idx) {
    const page = document.createElement('div');
    page.className = 'page';

    if (section.type === 'part') {
      page.innerHTML += `<div class="part-header"><div class="part-number-label">Part ${section.partNumber}</div><h1 class="part-main-title">${section.partTitle}</h1><div class="part-main-subtitle">${section.partSubtitle}</div></div>`;
    }

    section.blocks.forEach(block => {
      if (block.type === 'divider') {
        page.innerHTML += `<div class="section-divider"><span class="divider-ornament">&#10022;</span></div>`;
        return;
      }
      if (block.type === 'essay') {
        const anchor = block.isAnchor ? `<div class="anchor-label">&mdash; Anchor Essay &mdash;</div>` : '';
        const paras = block.body.map(p => typeof p === 'object' && p.type === 'divider' ? `<div class="section-divider"><span class="divider-ornament">&#10022;</span></div>` : `<p>${p}</p>`).join('');
        const titleHtml = block.title ? `<h2 class="essay-title">${block.title}</h2>` : '';
        page.innerHTML += `<div class="essay">${anchor}${titleHtml}${paras}</div>`;
      }
    });

    // Navigation
    const prevId = allIds[idx - 1];
    const nextId = allIds[idx + 1];
    const navDiv = document.createElement('div');
    navDiv.className = 'page-nav';

    let prevLabel = '&larr; Previous';
    let nextLabel = 'Next &rarr;';
    let nextAction = '';
    let prevAction = '';

    if (!prevId) {
      prevLabel = '&larr; Cover';
      prevAction = 'cover';
    } else {
      prevAction = prevId;
    }
    if (!nextId) {
      nextLabel = 'Continue to IMUA &rarr;';
      nextAction = '__imua__';
    } else {
      nextAction = nextId;
    }

    navDiv.innerHTML = `
      <button class="nav-btn" data-nav="${prevAction}">${prevLabel}</button>
      <span class="nav-indicator">${idx} of ${allIds.length - 1}</span>
      <button class="nav-btn" data-nav="${nextAction}">${nextLabel}</button>`;
    navDiv.querySelectorAll('[data-nav]').forEach(btn => {
      const t = btn.dataset.nav;
      if (t === '__imua__') {
        btn.onclick = () => { window.location.href = '/imua/'; };
      } else if (t) {
        btn.onclick = () => navigate(t);
      }
    });
    page.appendChild(navDiv);
    $main.appendChild(page);
  }

  // ── Audio Engine ───────────────────────────────────────────
  const $audio     = document.getElementById('audio');
  const $playBtn   = document.getElementById('play-btn');
  const $iconPlay  = document.getElementById('icon-play');
  const $iconPause = document.getElementById('icon-pause');
  const $speedBtn  = document.getElementById('speed-btn');
  const $title     = document.getElementById('player-title');
  const $time      = document.getElementById('player-time');
  const $fill      = document.getElementById('scrub-fill');
  const $scrub     = document.getElementById('scrub');

  const SPEEDS = [1, 1.25, 1.5, 1.75, 2];
  let speedIdx = 0;

  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    return `${m}:${String(Math.floor(s % 60)).padStart(2,'0')}`;
  }

  // Audio will load when origin_audio.mp3 is provided
  if (ORIGIN_BOOK.audio && ORIGIN_BOOK.audio['origin-full']) {
    $audio.src = ORIGIN_BOOK.audio['origin-full'];
  }

  $playBtn.addEventListener('click', () => $audio.paused ? $audio.play() : $audio.pause());
  $audio.addEventListener('play',  () => { $iconPlay.style.display = 'none'; $iconPause.style.display = ''; });
  $audio.addEventListener('pause', () => { $iconPlay.style.display = ''; $iconPause.style.display = 'none'; });
  $audio.addEventListener('timeupdate', () => {
    const t = $audio.currentTime, d = $audio.duration;
    $fill.style.width = d ? `${(t/d)*100}%` : '0%';
    $time.textContent = `${fmt(t)} / ${fmt(d)}`;
  });

  $scrub.addEventListener('click', e => {
    if (!$audio.duration) return;
    const r = $scrub.getBoundingClientRect();
    $audio.currentTime = ((e.clientX - r.left) / r.width) * $audio.duration;
  });

  $speedBtn.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    $audio.playbackRate = SPEEDS[speedIdx];
    $speedBtn.textContent = SPEEDS[speedIdx] === 1 ? '1\u00d7' : `${SPEEDS[speedIdx]}\u00d7`;
  });

  document.getElementById('main').style.paddingBottom = '80px';

  window.toggleSidebar = function () {
    if (isMobile()) {
      sidebarOpen = !sidebarOpen;
      $sidebar.classList.toggle('open', sidebarOpen);
      $toggle.classList.toggle('open', sidebarOpen);
      $overlay.classList.toggle('visible', sidebarOpen);
    } else {
      const collapsed = $sidebar.classList.toggle('collapsed');
      $toggle.classList.toggle('open', !collapsed);
      document.body.classList.toggle('sidebar-collapsed', collapsed);
    }
  };

  window.closeSidebar = function () {
    sidebarOpen = false;
    $sidebar.classList.remove('open');
    $toggle.classList.remove('open');
    $overlay.classList.remove('visible');
  };

  document.addEventListener('keydown', e => {
    const idx = allIds.indexOf(current);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      if (idx < allIds.length - 1) navigate(allIds[idx + 1]);
      else window.location.href = '/imua/';
    }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (idx > 0) navigate(allIds[idx - 1]); }
    else if (e.key === 'Escape') closeSidebar();
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 60) return;
    if (dx > 0 && !sidebarOpen) { window.toggleSidebar(); return; }
    if (dx < 0 && sidebarOpen) { closeSidebar(); return; }
    const idx = allIds.indexOf(current);
    if (dx < -60 && !sidebarOpen && idx < allIds.length - 1) navigate(allIds[idx + 1]);
    if (dx > 60 && !sidebarOpen && idx > 0) navigate(allIds[idx - 1]);
  }, { passive: true });

  buildNav();
  render();
})();
</script>
</body>
</html>
